<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader Pro</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; background: #2d2d2d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #4a90e2; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #357abd; }
        .footer { margin-top: 15px; font-size: 12px; color: #777; }
        #status { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Media Downloader</h2>
    <p style="font-size: 14px; color: #aaa;">TikTok, YT, Insta, Twitter</p>
    <input type="text" id="urlInput" placeholder="Вставь ссылку сюда...">
    <button onclick="download()">Скачать видео</button>
    <div id="status"></div>
    <div class="footer">Работает на базе Cobalt API (GitHub)</div>
</div>

<script>
    async function download() {
        const url = document.getElementById('urlInput').value;
        const status = document.getElementById('status');
        
        if (!url) { status.innerText = "Вставь ссылку!"; return; }
        
        status.innerText = "⏳ Обработка...";
        
        try {
            const response = await fetch('https://api.cobalt.tools/api/json', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    url: url,
                    vQuality: "1080", // Максимальное качество
                    filenameStyle: "pretty"
                })
            });

            const data = await response.json();

            if (data.url) {
                status.innerHTML = `<a href="${data.url}" target="_blank" style="color: #4ade80; text-decoration: none;">✅ Нажми сюда для сохранения</a>`;
                window.location.href = data.url; // Автоматический переход к скачиванию
            } else {
                status.innerText = "❌ Ошибка: " + (data.text || "не удалось получить ссылку");
            }
        } catch (error) {
            status.innerText = "❌ Ошибка сети";
        }
    }
</script>

</body>
</html>
